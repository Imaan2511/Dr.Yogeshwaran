<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spider Clock</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#000;
    font-family:Arial,sans-serif;
}

.clock{
    width:350px;
    height:350px;
    border:8px solid red;
    border-radius:50%;
    position:relative;
    background:radial-gradient(circle,#111,#000);
    box-shadow:0 0 30px red;
}

/* Spider Web */
.clock::before{
    content:"";
    position:absolute;
    inset:20px;
    border-radius:50%;
    border:2px solid rgba(255,255,255,.3);
}

.number{
    position:absolute;
    color:white;
    font-size:24px;
    font-weight:bold;
    transform:translate(-50%,-50%);
}

.hand{
    position:absolute;
    bottom:50%;
    left:50%;
    transform-origin:bottom;
    transform:translateX(-50%);
    border-radius:10px;
}

.hour{
    width:8px;
    height:80px;
    background:red;
}

.minute{
    width:5px;
    height:110px;
    background:white;
}

.second{
    width:2px;
    height:130px;
    background:red;
}

.center{
    width:18px;
    height:18px;
    background:white;
    border:4px solid red;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}
</style>
</head>

<body>

<div class="clock">

<div class="number" style="top:8%;left:50%;">12</div>
<div class="number" style="top:20%;left:80%;">1</div>
<div class="number" style="top:50%;left:92%;">3</div>
<div class="number" style="top:80%;left:80%;">5</div>
<div class="number" style="top:92%;left:50%;">6</div>
<div class="number" style="top:80%;left:20%;">7</div>
<div class="number" style="top:50%;left:8%;">9</div>
<div class="number" style="top:20%;left:20%;">11</div>

<div class="hand hour" id="hour"></div>
<div class="hand minute" id="minute"></div>
<div class="hand second" id="second"></div>

<div class="center"></div>

</div>

<script>

function updateClock(){

const now=new Date();

const sec=now.getSeconds();
const min=now.getMinutes();
const hr=now.getHours();

const secDeg=sec*6;
const minDeg=min*6+sec*0.1;
const hrDeg=(hr%12)*30+min*0.5;

document.getElementById("second").style.transform=
`translateX(-50%) rotate(${secDeg}deg)`;

document.getElementById("minute").style.transform=
`translateX(-50%) rotate(${minDeg}deg)`;

document.getElementById("hour").style.transform=
`translateX(-50%) rotate(${hrDeg}deg)`;

}

setInterval(updateClock,1000);
updateClock();

</script>

</body>
</html>
